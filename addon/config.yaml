name: PowerView to MQTT Bridge
# version is set to the release tag by scripts/tag-release.sh; it must match
# a published image tag or Supervisor will fail to pull the addon.
version: "2026.07.16-e0496b3d"
# Prebuilt images published by .github/workflows/build.yml; Supervisor pulls
# these instead of compiling on the device.
image: ghcr.io/benbraun/pview-addon-{arch}
slug: pv2mqtt
description: Control Hunter Douglas PowerView Gen 3 shades via Home Assistant MQTT
url: https://github.com/benbraun/pview
documentation: https://github.com/benbraun/pview/blob/main/README.md
issue_tracker: https://github.com/benbraun/pview/issues

arch:
  - amd64
  - aarch64
  - armv7

init: false
startup: services
services:
  - mqtt:need

apparmor: true

# Host network access is required for mDNS hub discovery
host_network: true

schema:
  hub_ip: "str?"
  mqtt_host: "str?"
  mqtt_port: "int?"
  mqtt_username: "str?"
  mqtt_password: "str?"
  debug_level: "str?"
