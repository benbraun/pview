name: PowerView to MQTT Bridge
version: "2026.3.0"
slug: pv2mqtt
description: Control Hunter Douglas PowerView Gen 3 shades via Home Assistant MQTT
url: https://github.com/wez/pview
documentation: https://github.com/wez/pview/blob/main/README.md
issue_tracker: https://github.com/wez/pview/issues

arch:
  - amd64
  - aarch64
  - armv7

init: false
startup: services
services:
  - mqtt:need

apparmor: true

# Host network access is required for mDNS hub discovery
host_network: true

schema:
  hub_ip: "str?"
  mqtt_host: "str?"
  mqtt_port: "int?"
  mqtt_username: "str?"
  mqtt_password: "str?"
  debug_level: "str?"
