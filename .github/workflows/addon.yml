name: addon

on:
  pull_request:
    branches:
      - main
    paths:
      - "addon/**"
      - ".github/workflows/addon.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.21
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:3.21
          - arch: armv7
            platform: linux/arm/v7
            build_from: ghcr.io/home-assistant/armv7-base:3.21
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Test build ${{ matrix.arch }} addon image
        uses: docker/build-push-action@v7
        with:
          context: addon
          file: addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
